<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Screen Saver Hub - Liquid Glass</title>
    <style>
        /* Base Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030107;
        }

        /* --- Liquid Glass / High Gloss Acrylic Utility Class --- */
        .liquid-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(35px) saturate(220%);
            -webkit-backdrop-filter: blur(35px) saturate(220%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.8),
                inset 0 1px 0px rgba(255, 255, 255, 0.25),
                inset 0 -10px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Liquid Shimmer Highlight Sheet overlay */
        .liquid-glass::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg);
            animation: liquidGlow 8s infinite ease-in-out;
        }

        @keyframes liquidGlow {
            0% { left: -150%; }
            30%, 100% { left: 150%; }
        }

        /* ========================================== */
        /* INTERACTIVE HOME SCREEN MENU               */
        /* ========================================== */
        #home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0f081d 0%, #030107 100%);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #home-screen.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .menu-title {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 50px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.15), 0 10px 20px rgba(0,0,0,0.5);
        }

        .hub-container {
            display: flex;
            gap: 25px;
            max-width: 95%;
            width: 1100px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Dynamic Theme-Driven Game Cards */
        .game-card {
            flex: 1;
            min-width: 220px;
            max-width: 260px;
            height: 280px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s ease;
            border: 1px solid rgba(var(--theme-color), 0.2);
        }

        .game-card img {
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.4s ease, filter 0.3s ease;
            filter: drop-shadow(0 0 20px rgba(var(--theme-color), 0.3));
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(var(--theme-color), 0.6);
        }
        .game-card:hover img {
            transform: scale(1.05);
            filter: drop-shadow(0 0 35px rgba(var(--theme-color), 0.75));
        }

        /* ========================================== */
        /* SCREENSAVER VIEWPLAYERS                    */
        /* ========================================== */
        #screensaver-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        #screensaver-view.active {
            opacity: 1;
            pointer-events: auto;
        }

        .slideshow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: none;
        }

        .slideshow-container.active {
            display: block;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center top;
            transform-origin: center top;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .slide.active {
            opacity: 1;
            animation: subtlePan 20s infinite alternate ease-in-out;
        }

        @keyframes subtlePan {
            0% { transform: scale(1.00) translate(0px, 0px); }
            100% { transform: scale(1.04) translate(-5px, 0px); }
        }

        /* Global Theme-Driven Lock Mode Layout */
        .lock-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: flex-start;
            align-items: flex-end;
            padding: 40px;
        }

        .blur-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center top;
            filter: blur(0px); 
            transform: scale(1.0);
        }

        .coming-soon-panel {
            padding: 30px;
            border-radius: 28px;
            text-align: center;
            z-index: 5;
            border: 1px solid rgba(var(--theme-color), 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 30px rgba(var(--theme-color), 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .coming-soon-custom-emoji {
            width: 150px;
            height: auto;
            object-fit: contain;
            display: block;
            animation: bouncePulse 2s infinite alternate ease-in-out;
        }

        @keyframes bouncePulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(var(--theme-color), 0.4)); }
            100% { transform: scale(1.06); filter: drop-shadow(0 0 25px rgba(var(--theme-color), 0.75)); }
        }

        /* Vignette Shield Layer */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(10, 4, 22, 0.0) 0%, rgba(3, 1, 7, 0.7) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* ========================================== */
        /* HUD ELEMENT GRAPHICS & HIDER HOOKS         */
        /* ========================================== */
        .screensaver-ui {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 3;
        }

        .brand-panel, .control-cluster {
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screensaver-ui.idle-hidden .control-cluster {
            opacity: 0;
            transform: translateY(-15px);
            pointer-events: none;
        }

        .brand-panel.manual-hidden {
            opacity: 0 !important;
            transform: scale(0.9) translateY(-20px) !important;
            pointer-events: none !important;
        }

        /* Top-Left Dynamic Brand HUD Panel */
        .brand-panel {
            position: absolute;
            top: 40px;
            left: 40px;
            padding: 18px 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 320px;
            max-width: 90%;
            border-radius: 24px;
        }

        #hud-logo {
            max-height: 70px;
            max-width: 100%;
            width: auto;
            height: auto;
            display: block;
            object-fit: contain;
            transition: filter 0.3s ease;
        }

        /* Top-Right Navigation Cluster Controls */
        .control-cluster {
            position: absolute;
            top: 40px;
            right: 40px;
            display: flex;
            gap: 15px;
        }

        .action-btn {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .action-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: rgba(255, 255, 255, 0.85);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="menu-title">Game Screen Saver</div>
        <div id="hub-container" class="hub-container">
            </div>
    </div>


    <div id="screensaver-view">
        
        <div id="slideshows-root"></div>

        <div class="vignette"></div>

        <div id="ui-wrapper" class="screensaver-ui">
            <div id="brand-hud" class="brand-panel liquid-glass">
                <img id="hud-logo" src="" alt="Dynamic HUD Logo">
            </div>

            <div class="control-cluster">
                <div id="logo-toggle-btn" class="action-btn liquid-glass" onclick="toggleLogoManualVisibility()" title="Toggle Logo Visibility">
                    <svg id="eye-icon" viewBox="0 0 24 24">
                        <path id="eye-path" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle id="eye-circle" cx="12" cy="12" r="3" />
                    </svg>
                </div>
                <div class="action-btn liquid-glass" onclick="returnToMainMenu()" title="Return to Main Menu">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                </div>
                <div id="fullscreen-toggle" class="action-btn liquid-glass" title="Toggle Fullscreen">
                    <svg id="fs-icon" viewBox="0 0 24 24">
                        <path d="M15 3h6v6M9 21H3v-6M21 9l-7 7M3 15l7-7" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        //  BRACKET-FREE CONFIGURATION ZONE (EDIT/ADD NEW ONES HERE!)
        // =========================================================================
        //  Instructions:
        //  - Just start a new entry with [SCREENSAVER]
        //  - Add settings line-by-line. NO commas, NO code brackets needed!
        //  - To add slideshow images, just add an "image:" line for each link.
        // =========================================================================
        const SCREENSAVER_CONFIG = `
            [SCREENSAVER]
            id: gta6
            title: Grand Theft Auto VI
            logo: https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Grand_Theft_Auto_VI_logo_%28with_gradient%29.svg/960px-Grand_Theft_Auto_VI_logo_%28with_gradient%29.svg.png
            color: 255, 0, 127
            coming_soon: false
            image: https://cdn.mos.cms.futurecdn.net/iPi3bFFgSfLnoNe8NS764n-1920-80.jpg
            image: https://i.ytimg.com/vi/3092p8sLigU/maxresdefault.jpg
            image: https://i.ytimg.com/vi/VPxheiG1vk8/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLC3OjhGbfIFxHyzf_3CzBFG0x6eyA
            image: https://i.ytimg.com/vi/OOqpvMW1CHg/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLDsCiZN_UScDXsRINhV1Y8yEZdlEg
            image: https://external-preview.redd.it/loading-screen-concept-with-most-of-the-new-artworks-v0-cm1tbXZ2aG45OXplMRoZawbQSdCcNdNUIWYUP_UNhktNkTa03ruqg7XFXqxV.png?format=pjpg&auto=webp&s=707e41b236cfe7012e8e1c233dd78cdb6a842eef
            image: https://images.digitalfoundry.net/af6dc907ef33a/large.jpg

            [SCREENSAVER]
            id: mkw
            title: Mario Kart World
            logo: https://static.wikia.nocookie.net/logopedia/images/4/44/Mario_Kart_World.png/revision/latest/scale-to-width-down/284?cb=20251020155918
            color: 255, 0, 127
            coming_soon: true
            image: https://cdn.mos.cms.futurecdn.net/iPi3bFFgSfLnoNe8NS764n-1920-80.jpg
            image: https://i.ytimg.com/vi/3092p8sLigU/maxresdefault.jpg
            image: https://i.ytimg.com/vi/VPxheiG1vk8/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLC3OjhGbfIFxHyzf_3CzBFG0x6eyA
            image: https://i.ytimg.com/vi/OOqpvMW1CHg/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLDsCiZN_UScDXsRINhV1Y8yEZdlEg
            image: https://external-preview.redd.it/loading-screen-concept-with-most-of-the-new-artworks-v0-cm1tbXZ2aG45OXplMRoZawbQSdCcNdNUIWYUP_UNhktNkTa03ruqg7XFXqxV.png?format=pjpg&auto=webp&s=707e41b236cfe7012e8e1c233dd78cdb6a842eef
            image: https://images.digitalfoundry.net/af6dc907ef33a/large.jpg
        `;
        // =========================================================================

        let screensavers = [];
        let slideLoopEngine = null;
        let activeSlides = [];
        let currentSlideIndex = 0;
        let idleMouseTimer = null;
        let isLogoManuallyHidden = false;
        
        const crossfadeTimeDuration = 6000;
        const uiWrapper = document.getElementById('ui-wrapper');
        const brandHudPanel = document.getElementById('brand-hud');
        const eyeIcon = document.getElementById('eye-icon');

        // Text parsing infrastructure engine (Turns your text lines safely into system profiles)
        function parseTextDatabase() {
            const list = [];
            let current = null;
            const lines = SCREENSAVER_CONFIG.split('\n');

            lines.forEach(line => {
                line = line.trim();
                if (!line || line.startsWith('//') || line.startsWith('#')) return;

                if (line === '[SCREENSAVER]') {
                    if (current) list.push(current);
                    current = {
                        id: '', title: '', logo: '', color: '255, 255, 255',
                        coming_soon: false, coming_soon_bg: '', coming_soon_badge: '', images: []
                    };
                    return;
                }

                if (current) {
                    const separatorIdx = line.indexOf(':');
                    if (separatorIdx !== -1) {
                        const key = line.substring(0, separatorIdx).trim().toLowerCase();
                        const val = line.substring(separatorIdx + 1).trim();

                        if (key === 'id') current.id = val;
                        else if (key === 'title') current.title = val;
                        else if (key === 'logo') current.logo = val;
                        else if (key === 'color') current.color = val;
                        else if (key === 'coming_soon') current.coming_soon = (val === 'true');
                        else if (key === 'coming_soon_bg') current.coming_soon_bg = val;
                        else if (key === 'coming_soon_badge') current.coming_soon_badge = val;
                        else if (key === 'image' && val) current.images.push(val);
                    }
                }
            });
            if (current) list.push(current);
            return list;
        }

        // Setup DOM interfaces dynamically
        document.addEventListener('DOMContentLoaded', () => {
            screensavers = parseTextDatabase();
            buildInteractiveLayouts();
        });

        function buildInteractiveLayouts() {
            const hubContainer = document.getElementById('hub-container');
            const slideshowsRoot = document.getElementById('slideshows-root');

            hubContainer.innerHTML = '';
            slideshowsRoot.innerHTML = '';

            screensavers.forEach(s => {
                // 1. Render Selector Card Frame
                const card = document.createElement('div');
                card.className = 'game-card liquid-glass';
                card.style.setProperty('--theme-color', s.color);
                card.onclick = () => launchScreensaver(s.id);

                const cardImg = document.createElement('img');
                cardImg.src = s.logo;
                cardImg.alt = s.title;
                card.appendChild(cardImg);
                hubContainer.appendChild(card);

                // 2. Render Corresponding Slideshow Deck Node
                const container = document.createElement('div');
                container.id = `slideshow-${s.id}`;
                container.className = 'slideshow-container';

                if (s.coming_soon) {
                    container.innerHTML = `
                        <div class="lock-wrapper">
                            <div class="blur-bg" style="background-image: url('${s.coming_soon_bg || 'https://wallpapercave.com/wp/wp9313677.jpg'}');"></div>
                            <div class="coming-soon-panel liquid-glass" style="--theme-color: ${s.color};">
                                <img class="coming-soon-custom-emoji" src="${s.coming_soon_badge || 'https://ia600103.us.archive.org/22/items/af-70bef-4-705a-4e-68-9094-827037892448-1/af70bef4-705a-4e68-9094-827037892448%20%281%29.png'}" alt="Custom Badge Logo">
                            </div>
                        </div>
                    `;
                } else {
                    s.images.forEach((imgUrl, index) => {
                        const slide = document.createElement('div');
                        slide.className = index === 0 ? 'slide active' : 'slide';
                        slide.style.backgroundImage = `url('${imgUrl}')`;
                        container.appendChild(slide);
                    });
                }
                slideshowsRoot.appendChild(container);
            });
        }

        // Activation Playback Controller
        function launchScreensaver(gameMode) {
            const s = screensavers.find(item => item.id === gameMode);
            if (!s) return;

            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('screensaver-view').classList.add('active');

            // Hide all decks first
            document.querySelectorAll('.slideshow-container').forEach(el => el.classList.remove('active'));
            
            // Show targeted current choice
            const targetContainer = document.getElementById(`slideshow-${gameMode}`);
            if (targetContainer) targetContainer.classList.add('active');

            // Set HUD graphic parameters dynamically
            const hudLogo = document.getElementById('hud-logo');
            hudLogo.src = s.logo;
            hudLogo.style.filter = `drop-shadow(0 0 25px rgba(${s.color}, 0.6))`;

            // Reset loop anchors
            activeSlides = document.querySelectorAll(`#slideshow-${gameMode} .slide`);
            currentSlideIndex = 0;

            if (activeSlides.length > 0) {
                activeSlides.forEach((slide, i) => {
                    if (i === 0) slide.classList.add('active');
                    else slide.classList.remove('active');
                });
                clearInterval(slideLoopEngine);
                slideLoopEngine = setInterval(cycleEngineSlides, crossfadeTimeDuration);
            } else {
                clearInterval(slideLoopEngine);
            }

            startTrackingMouseActivity();
        }

        function returnToMainMenu() {
            clearInterval(slideLoopEngine);
            stopTrackingMouseActivity();
            document.getElementById('screensaver-view').classList.remove('active');
            document.getElementById('home-screen').classList.remove('hidden');
        }

        function cycleEngineSlides() {
            if (!activeSlides.length) return;
            activeSlides[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex + 1) % activeSlides.length;
            activeSlides[currentSlideIndex].classList.add('active');
        }

        // ========================================== */
        // INTELLIGENT MOUSE TRACKING ENGINE (2S IDLE)*/
        // ========================================== */
        function parseActivityTrigger() {
            document.body.style.cursor = 'default';
            uiWrapper.classList.remove('idle-hidden');

            clearTimeout(idleMouseTimer);
            idleMouseTimer = setTimeout(() => {
                document.body.style.cursor = 'none';
                uiWrapper.classList.add('idle-hidden');
            }, 2000);
        }

        function startTrackingMouseActivity() {
            parseActivityTrigger();
            document.addEventListener('mousemove', parseActivityTrigger);
        }

        function stopTrackingMouseActivity() {
            clearTimeout(idleMouseTimer);
            document.removeEventListener('mousemove', parseActivityTrigger);
            document.body.style.cursor = 'default';
            uiWrapper.classList.remove('idle-hidden');
        }

        // ========================================== */
        // LOGO VISIBILITY CONTROL OVERRIDE SYSTEM    */
        // ========================================== */
        function toggleLogoManualVisibility() {
            isLogoManuallyHidden = !isLogoManuallyHidden;
            
            if (isLogoManuallyHidden) {
                brandHudPanel.classList.add('manual-hidden');
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23" />
                `;
            } else {
                brandHudPanel.classList.remove('manual-hidden');
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                `;
            }
        }

        // Fullscreen Controls Integration
        const fsToggle = document.getElementById('fullscreen-toggle');
        const fsIcon = document.getElementById('fs-icon');

        const enterFsPath = `<path d="M15 3h6v6M9 21H3v-6M21 9l-7 7M3 15l7-7" />`;
        const exitFsPath = `<path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7" />`;

        fsToggle.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen()
                    .then(() => { fsIcon.innerHTML = exitFsPath; })
                    .catch(err => { console.error(`Error enabling fullscreen: ${err.message}`); });
            } else {
                document.exitFullscreen();
                fsIcon.innerHTML = enterFsPath;
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) fsIcon.innerHTML = enterFsPath;
            else fsIcon.innerHTML = exitFsPath;
        });
    </script>
</body>
</html>
